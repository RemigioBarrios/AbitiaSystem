<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abitia - Acceso Unificado</title>
    <meta name="description" content="Portal de acceso administrativo global para Abitia. Gestión integral de condominios.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-bg: #f1f5f9;
            --color-card: #ffffff;
            --color-border: #e2e8f0;
            --color-text: #0f172a;
            --color-text-muted: #64748b;
            --color-label: #374151;
            --color-input-border: #d1d5db;
            --color-input-focus: #475569;
            --color-btn: #2c3e50;
            --color-btn-hover: #1a252f;
            --color-error-text: #dc2626;
            --color-error-bg: #fef2f2;
            --color-error-border: #fecaca;
            --color-link: #475569;
            --color-link-hover: #1e293b;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--color-text);
        }

        .card {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 26rem;
        }

        .card-header { text-align: center; margin-bottom: 2rem; }

        .card-header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--color-text);
        }

        .card-header p {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .form-group { display: flex; flex-direction: column; gap: 1.25rem; }

        .field { display: flex; flex-direction: column; gap: 0.375rem; }

        .field label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-label);
        }

        .field input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            font-family: inherit;
            background: #fff;
            border: 1px solid var(--color-input-border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
            color: var(--color-text);
        }

        .field input::placeholder { color: #9ca3af; }

        .field input:focus {
            border-color: var(--color-input-focus);
            box-shadow: 0 0 0 3px rgba(71,85,105,.12);
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--color-text);
            cursor: pointer;
        }

        .remember input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--color-btn);
            cursor: pointer;
        }

        .forgot {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-link);
            text-decoration: none;
            transition: color .15s;
        }

        .forgot:hover { color: var(--color-link-hover); }

        .btn-submit {
            width: 100%;
            padding: 0.5625rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: var(--color-btn);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background .15s, opacity .15s;
        }

        .btn-submit:hover:not(:disabled) { background: var(--color-btn-hover); }
        .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; }

        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
            text-align: center;
            color: var(--color-error-text);
            background: var(--color-error-bg);
            border: 1px solid var(--color-error-border);
            border-radius: var(--radius);
        }

        .error-box.visible { display: block; }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h1>Abitia</h1>
            <p>Acceso Administrativo Global</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="field">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        placeholder="admin@ejemplo.com">
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        placeholder="••••••••">
                </div>

                <div class="row">
                    <label class="remember">
                        <input id="remember-me" name="remember-me" type="checkbox">
                        Recordar sesión
                    </label>
                    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
                </div>

                <button id="submitBtn" type="submit" class="btn-submit">Iniciar Sesión</button>
            </div>
        </form>

        <div id="errorMessage" class="error-box"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Verificando...';
            errorDiv.classList.remove('visible');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Credenciales inválidas');
                }

                const storage = rememberMe ? localStorage : sessionStorage;
                storage.setItem('abitia_token', data.token);

                if (data.singleCondominio) {
                    storage.setItem('abitia_user', JSON.stringify({
                        id: data.usuario.IdUsuario,
                        nombre: data.usuario.nombre,
                        email: data.usuario.email,
                        rol: data.condominio.rol,
                        nombreRol: data.condominio.nombreRol,
                        condominioId: data.condominio.idCondominio,
                        slug: data.condominio.slug
                    }));

                    // Detección local vs producción
                    const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
                    const port = window.location.port ? `:${window.location.port}` : '';
                    const protocol = isLocal ? 'http:' : 'https:';
                    const baseDomain = isLocal ? 'localhost' : 'abitia.app';

                    window.location.href = `${protocol}//${data.condominio.slug}.${baseDomain}${port}/`;
                } else {
                    storage.setItem('abitia_user', JSON.stringify({
                        id: data.usuario.IdUsuario,
                        nombre: data.usuario.nombre,
                        email: data.usuario.email,
                        opciones: data.condominios
                    }));
                    window.location.href = '/app/dashboard.html';
                }

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.add('visible');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>

</html>
